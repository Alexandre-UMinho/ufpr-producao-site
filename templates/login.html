<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Administração UFPR</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: var(--glass-bg); padding: 3rem; border-radius: 20px; border: 1px solid var(--glass-border); width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="margin-bottom: 2rem;">Área do Professor</h2>
        {% if error %}
        <p style="color: #ef4444; margin-bottom: 1rem;">{{ error }}</p>
        {% endif %}
        <form method="POST" action="{{ url_for('login') }}" style="display: flex; flex-direction: column; gap: 1rem;">
            <input type="password" name="password" placeholder="Senha de Acesso" class="form-input" required>
            <button type="submit" class="cta-button" style="width: 100%;">Entrar</button>
        </form>
        <a href="{{ url_for('home') }}" style="display: block; margin-top: 1.5rem; color: var(--primary); text-decoration: none;">&larr; Voltar ao site</a>
    </div>
</body>
</html>
